<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Rector</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">


</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>Rector</h4>
            <hr>

            <a href="#">📚 Asignaturas</a>
            <a href="#" data-bs-toggle="modal" data-bs-target="#modalAsignatura">➕ Crear Asignatura</a>
            <a th:href="@{/swagger-ui/index.html}" target="_blank">Swagger API</a>

            <hr>

            <a th:href="@{/logout}">🚪 Cerrar sesión</a>
        </div>

        <!-- CONTENIDO -->
        <div class="col-md-10 p-4">

            <!-- TOPBAR -->
            <div class="topbar mb-4 d-flex justify-content-between">
                <h5>Panel de Control</h5>
                <span>Bienvenido Rector</span>
            </div>

            <!-- CARDS -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card card-custom p-3">
                        <h6>Total Asignaturas</h6>
                        <h3 th:text="${totalAsignaturas}">0</h3>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card card-custom p-3">
                        <h6>Total Docentes</h6>
                        <h3 th:text="${totalDocentes}">0</h3>
                    </div>
                </div>
            </div>

            <!-- TABLA -->
            <div class="card card-custom p-4">

                <div class="d-flex justify-content-between mb-3">
                    <h5>Asignaturas</h5>
                    <button class="btn btn-main" data-bs-toggle="modal" data-bs-target="#modalAsignatura">
                        + Nueva
                    </button>
                </div>

                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Salón</th>
                        <th>Día</th>
                        <th>Horario</th>
                        <th>Docente</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="asig : ${asignaturas}">
                        <td th:text="${asig.nombre}"></td>
                        <td th:text="${asig.descripcion}"></td>
                        <td th:text="${asig.salon}"></td>
                        <td th:text="${asig.diaSemana}"></td>
                        <td>
                            <span th:text="${asig.horaInicio}"></span> -
                            <span th:text="${asig.horaFin}"></span>
                        </td>
                        <td th:text="${asig.docente.nombre}"></td>

                        <td>
                            <button type="button"
                                    class="btn btn-sm btn-warning btn-editar-asignatura"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalAsignatura"
                                    th:attr="data-id=${asig.id},
                                             data-nombre=${asig.nombre},
                                             data-descripcion=${asig.descripcion},
                                             data-salon=${asig.salon},
                                             data-dia=${asig.diaSemana},
                                             data-inicio=${asig.horaInicio},
                                             data-fin=${asig.horaFin},
                                             data-docente=${asig.docente.id}">
                                Editar
                            </button>

                            <button type="button"
                                    class="btn btn-sm btn-danger btn-eliminar-asignatura"
                                    th:attr="data-id=${asig.id}">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>

            </div>

        </div>
    </div>
</div>

<!-- MODAL CREAR ASIGNATURA -->
<div class="modal fade" id="modalAsignatura" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header" style="background-color:#0d3b66; color:white;">
                <h5 class="modal-title">Crear Asignatura</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form id="formAsignatura" novalidate>
                <input type="hidden" name="id" id="asignaturaId">

                <div class="modal-body">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label>Nombre</label>
                            <input type="text" name="nombre" class="form-control" maxlength="30" required>
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Salon</label>
                            <select name="salon" class="form-control" required>
                                <option value="">Seleccione</option>
                                <option value="101">101</option>
                                <option value="102">102</option>
                                <option value="103">103</option>
                                <option value="201">201</option>
                                <option value="202">202</option>
                                <option value="203">203</option>
                                <option value="301">301</option>
                                <option value="302">302</option>
                                <option value="303">303</option>
                                <option value="401">401</option>
                                <option value="402">402</option>
                                <option value="403">403</option>
                                <option value="501">501</option>
                                <option value="502">502</option>
                                <option value="503">503</option>
                            </select>
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Día</label>
                            <select name="diaSemana" class="form-control" required>
                                <option value="">Seleccione</option>
                                <option value="LUNES">Lunes</option>
                                <option value="MARTES">Martes</option>
                                <option value="MIERCOLES">Miércoles</option>
                                <option value="JUEVES">Jueves</option>
                                <option value="VIERNES">Viernes</option>
                            </select>
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label>Descripción</label>
                            <textarea name="descripcion" class="form-control" maxlength="100" required></textarea>
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Hora Inicio</label>
                            <input type="time" name="horaInicio" class="form-control" required>
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Hora Fin</label>
                            <input type="time" name="horaFin" class="form-control" required>
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="col-md-12 mb-3">
                            <label>Docente Encargado</label>
                            <select name="docenteId" class="form-control" required>
                                <option value="">Seleccione</option>

                                <option th:each="doc : ${docentes}"
                                        th:value="${doc.id}"
                                        th:text="${doc.nombre}">
                                </option>
                            </select>
                            <div class="invalid-feedback"></div>
                        </div>

                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-main">
                        Guardar
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/css/js/app.js}"></script>

</body>
</html>
