<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Docente</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f7d774, #a6c9e2);
        }

        .sidebar {
            height: 100vh;
            background-color: #0d3b66;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }

        .sidebar a:hover {
            color: #f4a261;
        }

        .topbar {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        .card-custom {
            border-radius: 15px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-main {
            background-color: #f4a261;
            color: white;
            border: none;
        }

        .btn-main:hover {
            background-color: #e76f51;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>Docente</h4>
            <hr>

            <a href="#">📚 Mis Asignaturas</a>

            <hr>

            <a th:href="@{/logout}">🚪 Cerrar sesión</a>
        </div>

        <!-- CONTENIDO -->
        <div class="col-md-10 p-4">

            <!-- TOPBAR -->
            <div class="topbar mb-4 d-flex justify-content-between">
                <h5>Panel Docente</h5>
                <span>Bienvenido</span>
            </div>

            <!-- TABLA -->
            <div class="card card-custom p-4">

                <h5 class="mb-3">Mis Asignaturas</h5>

                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Salón</th>
                        <th>Día</th>
                        <th>Horario</th>
                        <th>Acción</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="asig : ${asignaturas}">
                        <td th:text="${asig.nombre}"></td>
                        <td th:text="${asig.descripcion}"></td>
                        <td th:text="${asig.salon}"></td>
                        <td th:text="${asig.diaSemana}"></td>
                        <td>
                            <span th:text="${asig.horaInicio}"></span> -
                            <span th:text="${asig.horaFin}"></span>
                        </td>

                        <td>
                            <button class="btn btn-sm btn-main"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalHorario"
                                    th:attr="data-id=${asig.id},
                                                 data-dia=${asig.diaSemana},
                                                 data-inicio=${asig.horaInicio},
                                                 data-fin=${asig.horaFin}">
                                Editar Horario
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>

            </div>

        </div>
    </div>
</div>

<!-- MODAL EDITAR HORARIO -->
<div class="modal fade" id="modalHorario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header" style="background-color:#0d3b66; color:white;">
                <h5 class="modal-title">Actualizar Horario</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form id="formHorario" novalidate>

                <div class="modal-body">

                    <input type="hidden" name="id" id="asignaturaId">

                    <div class="mb-3">
                        <label>Día</label>
                        <select name="diaSemana" id="diaSemana" class="form-control" required>
                            <option value="">Seleccione</option>
                            <option value="LUNES">Lunes</option>
                            <option value="MARTES">Martes</option>
                            <option value="MIERCOLES">Miércoles</option>
                            <option value="JUEVES">Jueves</option>
                            <option value="VIERNES">Viernes</option>
                        </select>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="mb-3">
                        <label>Hora Inicio</label>
                        <input type="time" name="horaInicio" id="horaInicio" class="form-control" required>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="mb-3">
                        <label>Hora Fin</label>
                        <input type="time" name="horaFin" id="horaFin" class="form-control" required>
                        <div class="invalid-feedback"></div>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-main">
                        Guardar
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/css/js/app.js}"></script>

<script>
    const modal = document.getElementById('modalHorario');

    modal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        const id = button.getAttribute('data-id');
        const dia = button.getAttribute('data-dia');
        const inicio = button.getAttribute('data-inicio');
        const fin = button.getAttribute('data-fin');

        document.getElementById('asignaturaId').value = id;
        document.getElementById('diaSemana').value = dia;
        document.getElementById('horaInicio').value = inicio;
        document.getElementById('horaFin').value = fin;
    });
</script>

</body>
</html>
